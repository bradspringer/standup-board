<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BOB Pro Standup Tracker</title>
<style>
:root { --page:#f9f9f7; --surface:#fcfcfb; --ink:#0b0b0b; --ink2:#52514e;
  --border:rgba(11,11,11,.12); --accent:#2a78d6; --crit:#d03b3b; }
@media (prefers-color-scheme: dark) { :root { --page:#0d0d0d; --surface:#1a1a19;
  --ink:#fff; --ink2:#c3c2b7; --border:rgba(255,255,255,.12); --accent:#3987e5; --crit:#e66767; } }
* { box-sizing:border-box }
body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:var(--page); color:var(--ink); font:15px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:32px 34px; max-width:360px; width:calc(100% - 40px); }
h1 { font-size:18px; margin:0 0 4px; }
p { color:var(--ink2); font-size:13.5px; margin:0 0 18px; }
input { width:100%; padding:9px 12px; font-size:15px; border:1px solid var(--border);
  border-radius:7px; background:var(--page); color:var(--ink); }
input:focus { outline:2px solid var(--accent); outline-offset:1px; border-color:transparent; }
button { margin-top:12px; width:100%; padding:9px 12px; font-size:14.5px; font-weight:600;
  border:none; border-radius:7px; background:var(--accent); color:#fff; cursor:pointer; }
.err { color:var(--crit); font-size:13px; margin:10px 0 0; display:none; }
</style>
</head>

</div>

<script>
const data = JSON.parse(document.getElementById('payload').textContent);
const un64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function unlock(pw) {
  const baseKey = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:un64(data.salt), iterations:data.iters, hash:'SHA-256' },
    baseKey, { name:'AES-GCM', length:256 }, false, ['decrypt']);
  const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv:un64(data.iv) }, key, un64(data.ct));
  return new TextDecoder().decode(pt);
}
async function tryOpen(pw, remember) {
  const html = await unlock(pw); // throws on wrong password
  if (remember) { try { localStorage.setItem('standup_pw', pw); } catch (e) {} }
  document.open(); document.write(html); document.close();
}
document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  try { await tryOpen(document.getElementById('pw').value, true); }
  catch (err) { document.getElementById('err').style.display = 'block'; }
});
try {
  const saved = localStorage.getItem('standup_pw');
  if (saved) tryOpen(saved, false).catch(() => { try { localStorage.removeItem('standup_pw'); } catch (e) {} });
} catch (e) {}
</script>
